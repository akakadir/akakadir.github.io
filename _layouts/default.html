<!DOCTYPE html>
<html lang="{{- page.lang | default: "tr" -}}">
  {% include head.html %}
  <body>
    <main class="page-content">
      <div class="container py-5">
        <div class="mx-auto" style="max-width: 800px;">
          {{- content -}}
        </div>
      </div>
    </main>
    {% include_cached new-window-fix.html %}
    {% minibundle js %}
      source_dir: assets/js
      destination_path: assets/bundle
      assets:
        - icons
        - fslightbox
        - lightbox
      attributes:
        defer: ''
    {% endminibundle %}
  </body>
</html>
