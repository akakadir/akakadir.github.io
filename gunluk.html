<!DOCTYPE html>
<html lang="tr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>//tuçem'e</title>
  <style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', Courier, monospace;
  color: #d4d4d4;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #2e2e2e;
}

.notepad-container {
  position: relative;
  width: 75%;
  max-width: 600px;
  height: 75vh;
  overflow: hidden;
  border-radius: 5px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
  z-index: 1;
}

.notepad {
  position: relative;
  width: 100%;
  height: 100%;
  background: #2d2d2d;
  border: 1px solid #444;
  padding: 20px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
  overflow-y: scroll;
  overflow-x: hidden;
  line-height: 1.6;
}

.guide-lines {
  position: absolute;
  left: 70px;
  top: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(to bottom, #2d2d2d, #2d2d2d 24px, #3a3a3a 25px);
  pointer-events: none;
}

.red-line {
  position: absolute;
  left: 60px;
  top: 0;
  width: 2px;
  height: 100%;
  background-color: #e74c3c;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  white-space: pre-wrap;
  word-wrap: break-word;
  margin-left: 70px;
  padding-right: 10px;
}

/* Responsive Design */
@media screen and (max-width: 768px) {
  .notepad-container {
    width: 90%;
    height: 80vh;
  }

  .notepad {
    padding: 15px;
  }

  .guide-lines {
    left: 50px;
  }

  .red-line {
    left: 40px;
  }

  .content {
    margin-left: 50px;
    padding-right: 15px;
  }
}

@media screen and (max-width: 480px) {
  .notepad-container {
    width: 95%;
    height: 85vh;
  }

  .notepad {
    padding: 10px;
  }

  .guide-lines {
    left: 30px;
  }

  .red-line {
    left: 20px;
  }

  .content {
    margin-left: 30px;
    padding-right: 20px;
  }
}

  </style>
</head>
<body>
  <div class="notepad-container">
    <div class="notepad">
      <div class="guide-lines"></div>
      <div class="red-line"></div>
      <div class="content" id="content"></div>
    </div>
  </div>
 <script>
    async function fetchTextFile() {
      try {
        const response = await fetch('https://litter.catbox.moe/jnh0i1.txt');
        if (!response.ok) throw new Error('/...404 dosya hatası.../');
        return await response.text();
      } catch (error) {
        console.error(error);
        return '/...404 dosya hatası.../';
      }
    }

    async function typeEffect(text, elementId, delay = 100) {
      const element = document.getElementById(elementId);
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, delay);
        }
      }
      typing();
    }

    (async () => {
      const text = await fetchTextFile();
      typeEffect(text, 'content', 15);
    })();

    const notepad = document.querySelector('.notepad');
    const guideLines = document.querySelector('.guide-lines');
    const redLine = document.querySelector('.red-line');

    notepad.addEventListener('scroll', () => {
      const scrollTop = notepad.scrollTop;
      guideLines.style.transform = `translateY(${scrollTop}px)`;
      redLine.style.transform = `translateY(${scrollTop}px)`;
    });
  </script>
</body>
</html>
