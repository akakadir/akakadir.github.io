<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>//tuçem'e</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #1e1e1e;
      font-family: 'Courier New', Courier, monospace;
      color: #d4d4d4;
      overflow: hidden;
    }

    .notepad {
      position: relative;
      width: 90%;
      max-width: 600px;
      height: 80vh;
      background: #2d2d2d;
      border: 1px solid #444;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Sabit kılavuz çizgiler */
    .guide-lines {
      position: fixed;
      left: 70px;
      top: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        #2d2d2d,
        #2d2d2d 24px,
        #3a3a3a 25px
      );
      pointer-events: none;
      z-index: 1;
    }

    .red-line {
      position: fixed;
      left: 60px;
      top: 0;
      width: 2px;
      height: 100%;
      background-color: #e74c3c;
      pointer-events: none;
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-left: 70px;
      padding-right: 10px;
    }

    /* Scrollbar tasarımı */
    .notepad::-webkit-scrollbar {
      width: 8px;
    }

    .notepad::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }

    .notepad::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .notepad::-webkit-scrollbar-track {
      background: #2d2d2d;
    }

    /* Pixelimsi hoş bir efekt için */
    body {
      text-shadow: 0 0 1px #000;
    }

    .content {
      font-size: 16px;
      text-shadow: 0 0 2px #000;
    }

    @media (max-width: 768px) {
      .notepad {
        height: 90vh;
      }

      .content {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100vh;">
    <div class="guide-lines"></div>
    <div class="red-line"></div>
    <div class="notepad">
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    async function fetchTextFile() {
      try {
        const response = await fetch('https://files.catbox.moe/h8duuo.txt');
        if (!response.ok) throw new Error('Sayın developer müsait olduğunda ".txt" dosyasını kontrol et muhtemelen süresi dolmuş, insanlar hiçbirşey göremiyor.');
        return await response.text();
      } catch (error) {
        console.error(error);
        return '/...404 file error.../';
      }
    }

    async function typeEffect(text, elementId, delay = 100) {
      const element = document.getElementById(elementId);
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, delay);
        }
      }
      typing();
    }

    (async () => {
      const text = await fetchTextFile();
      typeEffect(text, 'content', 5);
    })();
  </script>
</body>
</html>
