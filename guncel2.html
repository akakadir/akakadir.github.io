<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sevgiliye Not</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #2e2e2e;
      font-family: 'Courier New', Courier, monospace;
      color: #d4d4d4;
      overflow: hidden;
    }

    .notepad-container {
      position: relative;
      width: 90%;
      max-width: 600px;
      height: 80vh;
      overflow: hidden;
      border-radius:5px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
    }

    .notepad {
      position: relative;
      width: 100%;
      height: 100%;
      background: #2d2d2d;
      border: 1px solid #444;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      overflow-y: scroll;
      overflow-x: hidden;
      line-height: 1.6;
      z-index: 1;
    }

    .guide-lines {
      position: absolute;
      left: 70px;
      top: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(to bottom, #2d2d2d, #2d2d2d 24px, #3a3a3a 25px);
      pointer-events: none;
      z-index: 0;
    }

    .red-line {
      position: absolute;
      left: 60px;
      top: 0;
      width: 2px;
      height: 100%;
      background-color: #e74c3c;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-left: 70px;
      padding-right: 10px;
    }

    .notepad::-webkit-scrollbar {
      width: 12px;
    }

    .notepad::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 6px;
    }

    .notepad::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .notepad::-webkit-scrollbar-track {
      background: #2d2d2d;
    }

    @media (max-width: 768px) {
      .notepad-container {
        height: 90vh;
      }

      .content {
        font-size: 14px;
      }

      .notepad::-webkit-scrollbar {
        width: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="notepad-container">
    <div class="notepad">
      <div class="guide-lines"></div>
      <div class="red-line"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    async function fetchTextFile() {
      try {
        const response = await fetch('https://litter.catbox.moe/jnh0i1.txt');
        if (!response.ok) throw new Error('Dosya yüklenemedi');
        return await response.text();
      } catch (error) {
        console.error(error);
        return 'Dosya bulunamadı veya bir hata oluştu.';
      }
    }

    async function typeEffect(text, elementId, delay = 100) {
      const element = document.getElementById(elementId);
      let i = 0;
      function typing() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(typing, delay);
        }
      }
      typing();
    }

    (async () => {
      const text = await fetchTextFile();
      typeEffect(text, 'content', 5);
    })();

    const notepad = document.querySelector('.notepad');
    const guideLines = document.querySelector('.guide-lines');
    const redLine = document.querySelector('.red-line');

    notepad.addEventListener('scroll', () => {
      const scrollTop = notepad.scrollTop;
      guideLines.style.transform = `translateY(${scrollTop}px)`;
      redLine.style.transform = `translateY(${scrollTop}px)`;
    });
  </script>
</body>
</html>
