title: "akakadir"
description: "dünyama hoşgeldin, yazılım ve manipülasyon üzerine; en azından ben öyle diye biliyorum."
author:
  name: "akakadir"
  email: "kaddir@tuta.io"
url: "https://akakadir.github.io"
baseurl: ""
permalink: "/:slug.html"
favicon: "/assets/img/base/101037506.png"
logo: "/assets/img/base/101037506.png"
image: "/assets/img/base/101037506.png"
encoding: utf-8

theme_config:
  appearance: "auto"
