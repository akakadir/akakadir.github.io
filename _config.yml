author: akakadir
email: kaddir@tuta.io
url: https://akakadir.github.io
permalink: /:slug.html
favicon: "logo.png"

# for jekyll
remote_theme: no-style-please
theme_config:
  appearance: "light"
  back_home_text: "ana sayfa"
  date_format: "%d.%m.%Y"
  show_description: false

sass:
  style: :compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
  highlighter: rouge
kramdown:
  input: GFM
syntax_highlighter: rouge
  syntax_highlighter_opts:
  css_class: 'highlight'
span:
  line_numbers: false
block:
  line_numbers: true
  start_line: 1
